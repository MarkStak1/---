services:
  - type: web
    name: gorod-events
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn gorod_events_site.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # DATABASE_URL необязателен: без него используется SQLite на Render.
      # Для PostgreSQL (Neon/Supabase) добавьте переменную DATABASE_URL в Dashboard.
